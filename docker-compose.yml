version: '3.8'

services:
  # ========================================================================
  # MAIN FASTAPI APPLICATION
  # ========================================================================
  agentic-os-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-os-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=4
      - API_RELOAD=False
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      
      # Database
      - DB_TYPE=postgresql
      - DB_URL=postgresql://postgres:postgres@postgres:5432/agentic_os
      
      # LLM Configuration
      - LLM_PROVIDER=openai
      - LLM_MODEL=gpt-4
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # Qdrant Vector DB
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      
      # Observability
      - LOG_LEVEL=INFO
      - TRACE_LOGGING=true
      - METRICS_ENABLED=true
    
    volumes:
      - ./src:/app/src:ro
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
    
    depends_on:
      - redis
      - postgres
      - qdrant
    
    networks:
      - agentic-os-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  
  # ========================================================================
  # REDIS - CACHING & SESSION STORE
  # ========================================================================
  redis:
    image: redis:7.0-alpine
    container_name: agentic-os-redis
    ports:
      - "6379:6379"
    
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    
    volumes:
      - redis-data:/data
    
    networks:
      - agentic-os-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ========================================================================
  # POSTGRESQL - PRIMARY DATABASE
  # ========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: agentic-os-postgres
    ports:
      - "5432:5432"
    
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agentic_os
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    
    networks:
      - agentic-os-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ========================================================================
  # QDRANT - VECTOR DATABASE FOR SEMANTIC SEARCH
  # ========================================================================
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: agentic-os-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-test-key}
    
    volumes:
      - qdrant-data:/qdrant/storage
      - ./scripts/qdrant-config.yaml:/qdrant/config/qdrant.yaml:ro
    
    networks:
      - agentic-os-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ========================================================================
  # MOCK API SERVER (For testing tool integrations)
  # ========================================================================
  mock-api:
    image: mockserver/mockserver:latest
    container_name: agentic-os-mock-api
    ports:
      - "1080:1080"
    
    environment:
      - MOCKSERVER_PROPERTY_FILE=/mockserver/mockserver-init.properties
      - MOCKSERVER_INITIALIZATION_JSON_PATH=/mockserver/mockserver-init.json
    
    volumes:
      - ./scripts/mock-api-config.json:/mockserver/mockserver-init.json:ro
    
    networks:
      - agentic-os-network
    
    restart: unless-stopped
  
  # ========================================================================
  # PROMETHEUS - METRICS COLLECTION
  # ========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: agentic-os-prometheus
    ports:
      - "9090:9090"
    
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    
    networks:
      - agentic-os-network
    
    restart: unless-stopped
  
  # ========================================================================
  # GRAFANA - VISUALIZATION DASHBOARDS
  # ========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: agentic-os-grafana
    ports:
      - "3000:3000"
    
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=redis-datasource
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./scripts/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./scripts/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    
    depends_on:
      - prometheus
    
    networks:
      - agentic-os-network
    
    restart: unless-stopped
  
  # ========================================================================
  # PGADMIN - DATABASE MANAGEMENT UI
  # ========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agentic-os-pgadmin
    ports:
      - "5050:80"
    
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@agentic-os.local
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - SCRIPT_NAME=/pgadmin
    
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    
    depends_on:
      - postgres
    
    networks:
      - agentic-os-network
    
    restart: unless-stopped

# ========================================================================
# VOLUMES
# ========================================================================
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  qdrant-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  pgadmin-data:
    driver: local

# ========================================================================
# NETWORKS
# ========================================================================
networks:
  agentic-os-network:
    driver: bridge

# ========================================================================
# USAGE INSTRUCTIONS
# ========================================================================
#
# Start the full stack:
#   docker-compose up -d
#
# Stop the stack:
#   docker-compose down
#
# View logs:
#   docker-compose logs -f agentic-os-api
#
# Access services:
#   FastAPI:     http://localhost:8000
#   Swagger UI:  http://localhost:8000/docs
#   Prometheus:  http://localhost:9090
#   Grafana:     http://localhost:3000 (admin/admin)
#   PgAdmin:     http://localhost:5050
#   Qdrant:      http://localhost:6333
#   Redis:       localhost:6379
#   PostgreSQL:  localhost:5432
#
# Database connection (PostgreSQL):
#   Host: postgres
#   Port: 5432
#   User: postgres
#   Password: postgres
#   Database: agentic_os
#
# Environment variables:
#   Copy .env.example to .env and customize
#   Key variables:
#     - OPENAI_API_KEY: Your OpenAI API key
#     - QDRANT_API_KEY: Optional Qdrant API key
#     - GRAFANA_PASSWORD: Grafana admin password
#     - PGADMIN_PASSWORD: PgAdmin admin password